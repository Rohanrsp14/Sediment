name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Syntax-check every module
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Confirm no real transcript was committed
        run: |
          if find . -name '*.jsonl' -not -path './node_modules/*' -not -path './.git/*' | grep -v 'fixtures/clean-session.jsonl'; then
            echo "::error::a .jsonl file outside fixtures/ was found in the repo"
            exit 1
          fi
          echo "clean — only the synthetic fixture is present"
